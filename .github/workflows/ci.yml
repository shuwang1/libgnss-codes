name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test  --enable-code-coverage
      # 2. Convert Swift's internal LLVM coverage data into standard lcov format
      - name: Convert Coverage to LCOV
        uses: maxep/spm-lcov-action@0.3.0
        with:
          output-file: ./coverage/lcov.info
      - name: Upload
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_SHUWANG1_LIBGNSS_CODES_TOKEN }}
